version: '3.8'

services:
  # 1. The Brains of the Operation (LLM Server)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_storage:/root/.ollama
    # Support NV
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Support NV
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 120s
      timeout: 120s
      retries: 5
      start_period: 120s

  # 2. Memory Persistence (Vector Database)
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    # Support NV 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    #  Support NV 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 4. The Private Search Engine
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    ports:
      - "8181:8080" # Host 8181 -> Container 8080
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8181/ 
    # Support NV
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Support NV 
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # 3. The Orchestrator (UI)
  anythingllm:
    image: mintplexlabs/anythingllm
    container_name: anythingllm
    restart: always
    ports:
      - "3001:3001"
    environment:
      - STORAGE_DIR=/app/server/storage
    volumes:
      - ./anythingllm_storage:/app/server/storage
      - ./anythingllm_storage/.env:/app/server/.env
    # Support NV 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Support NV 
    depends_on:
      - ollama
      - qdrant
      - searxng
    #depends_on:
    #  ollama:
    #    condition: service_healthy
    #  qdrant:
    #    condition: service_healthy
    #  searxng:
    #    condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/ping || exit 1"]
      interval: 60s
      timeout: 120s
      retries: 10
      start_period: 120s